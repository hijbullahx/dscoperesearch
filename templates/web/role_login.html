{% extends 'web/base.html' %}

{% block content %}
<section class="auth-shell">
  <div class="auth-intro">
    <span class="hero-kicker">{{ role_kicker }}</span>
    <h1 class="page-title">{{ role_title }}</h1>
  </div>

  <form method="post" class="form-panel auth-card">
    {% csrf_token %}
    <div class="form-row">
      <label for="role_username">Username</label>
      <input id="role_username" name="username" type="text" autocomplete="username" required>
    </div>
    <div class="form-row">
      <label for="role_password">Password</label>
      <input id="role_password" name="password" type="password" autocomplete="current-password" required>
    </div>
    <button class="btn auth-submit" type="submit">{{ role_button }}</button>
  </form>
</section>
{% endblock %}
