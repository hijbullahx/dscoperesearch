{% extends 'web/base.html' %}

{% block content %}
<section class="auth-shell">
  <div class="auth-intro">
    <span class="hero-kicker">Admin Access</span>
    <h1 class="page-title">Sign in to Admin Panel</h1>
  </div>

  <form method="post" class="form-panel auth-card">
    {% csrf_token %}
    <div class="form-row">
      <label for="id_username">Username</label>
      {{ form.username }}
    </div>
    <div class="form-row">
      <label for="id_password">Password</label>
      {{ form.password }}
    </div>
    <button class="btn auth-submit" type="submit">Log In</button>
  </form>
</section>
{% endblock %}
