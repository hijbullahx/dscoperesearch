{% extends 'web/base.html' %}

{% block content %}
<h1 class="page-title">Projects</h1>
<div class="grid">
  {% for project in projects %}
    <article class="card">
      <h3>{{ project.title }}</h3>
      <p>{{ project.description }}</p>
      {% if project.github_link %}
        <a class="btn" href="{{ project.github_link }}" target="_blank" rel="noreferrer">View Project</a>
      {% endif %}
    </article>
  {% empty %}
    <div class="card muted">No projects yet.</div>
  {% endfor %}
</div>
{% endblock %}
